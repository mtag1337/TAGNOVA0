<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | تاجنوفا أكاديمي</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --bg: #f3f4f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; transition: 0.3s; }
        .logo { font-size: 2rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        h2 { margin: 0 0 20px; color: #1f2937; }
        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; color: #4b5563; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; transition: 0.2s; font-family: inherit; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-family: inherit; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { background: #4338ca; }
        .btn-alt { background: white; color: var(--success); border: 2px solid var(--success); }
        .btn-alt:hover { background: var(--success); color: white; }
        .footer-text { margin-top: 20px; font-size: 0.85rem; color: #6b7280; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">TajNova</div>
        <h2>مرحباً بك مجدداً</h2>
        
        <div class="input-group">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label>كلمة السر</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-main" onclick="login()">تسجيل الدخول</button>
        <button class="btn-alt" onclick="signup()">إنشاء حساب جديد</button>

        <p class="footer-text">منصة تاجنوفا لتعليم المستقبل</p>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyB3HKkZM7R2smYZWMPWFv-qlB1EsDLLtZ8",
          authDomain: "tagnova-c731d.firebaseapp.com",
          projectId: "tagnova-c731d",
          storageBucket: "tagnova-c731d.firebasestorage.app",
          messagingSenderId: "766445735869",
          appId: "1:766445735869:web:6be60478a80ba4882c8cd4"
        };

        firebase.initializeApp(firebaseConfig);

        function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) { alert("يرجى ملء البيانات"); return; }
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => { window.location.href = "/dashboard"; })
                .catch((error) => alert("خطأ: " + error.message));
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = "/dashboard"; })
                .catch((error) => alert("خطأ: " + error.message));
        }
    </script>
</body>
</html>
