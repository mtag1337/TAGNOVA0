<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول منصة تاجنوفا</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-login { background: #007bff; color: white; }
        .btn-signup { background: #28a745; color: white; }
    </style>
</head>
<body>

    <div class="auth-card">
        <h2>تاجنوفا أكاديمي</h2>
        <p>سجل دخولك لتبدأ التعلم</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة السر">
        <button class="btn-login" onclick="login()">دخول</button>
        <button class="btn-signup" onclick="signup()">إنشاء حساب جديد</button>
    </div>

    <script>
        // Config الرموز الخاصة بمشروعك
        const firebaseConfig = {
          apiKey: "AIzaSyB3HKkZM7R2smYZWMPWFv-qlB1EsDLLtZ8",
          authDomain: "tagnova-c731d.firebaseapp.com",
          projectId: "tagnova-c731d",
          storageBucket: "tagnova-c731d.firebasestorage.app",
          messagingSenderId: "766445735869",
          appId: "1:766445735869:web:6be60478a80ba4882c8cd4"
        };

        firebase.initializeApp(firebaseConfig);

        function signup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => { alert("تم إنشاء الحساب بنجاح!"); window.location.href = "/dashboard"; })
                .catch((error) => alert("خطأ: " + error.message));
        }

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => { window.location.href = "/dashboard"; })
                .catch((error) => alert("خطأ في البيانات: " + error.message));
        }
    </script>
</body>
</html>
