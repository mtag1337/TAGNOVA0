<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | TajNova Academy</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* حاوية الخلفية المتحركة */
        .bg-slider {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #000;
        }

        .bg-slide {
            position: absolute;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            animation: zoomEffect 20s infinite alternate;
        }

        @keyframes zoomEffect {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .bg-slide.active { opacity: 0.4; } /* تعتيم الصورة عشان الكلام يظهر */

        /* تصميم الكارت الزجاجي */
        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        .logo { font-size: 3rem; font-weight: 900; color: var(--secondary); margin-bottom: 5px; }
        
        .role-selector {
            display: flex;
            background: rgba(0,0,0,0.05);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        .role-option {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            border: none;
            background: transparent;
        }

        .role-option.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btn-google {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .btn-google:hover { background: #f8f9fa; transform: translateY(-2px); }

        .input-box {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            text-align: right;
            font-family: 'Cairo';
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { background: var(--secondary); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .btn-link { background: none; border: none; color: var(--secondary); font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="bg-slider">
        <div class="bg-slide active" style="background-image: url('https://images.unsplash.com/photo-1523050335102-c6744729ea2f?q=80&w=2070')"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1501504905252-473c47e087f8?q=80&w=1974')"></div>
        <div class="bg-slide" style="background-image: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=2070')"></div>
    </div>

    <div class="auth-card">
        <div class="logo">TajNova</div>
        <p style="color: #666; margin-bottom: 20px;">أهلاً بك في أكاديمية المستقبل</p>

        <div class="role-selector">
            <button class="role-option active" id="studentTab" onclick="selectRole('student')">🎓 طالب</button>
            <button class="role-option" id="teacherTab" onclick="selectRole('instructor')">👨‍🏫 مدرس</button>
        </div>

        <button class="btn-google" onclick="googleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            الدخول بواسطة جوجل
        </button>

        <input type="email" id="email" class="input-box" placeholder="البريد الإلكتروني">
        <input type="password" id="password" class="input-box" placeholder="كلمة السر">
        
        <button class="btn-main" onclick="authAction('login')">دخول</button>
        <button class="btn-link" onclick="authAction('signup')">إنشاء حساب جديد</button>
    </div>

    <script>
        // --- إعدادات الخلفية ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.bg-slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 6000); // تغيير الصورة كل 6 ثواني

        // --- Firebase Logic ---
        const firebaseConfig = {
          apiKey: "AIzaSyB3HKkZM7R2smYZWMPWFv-qlB1EsDLLtZ8",
          authDomain: "tagnova-c731d.firebaseapp.com",
          projectId: "tagnova-c731d",
          storageBucket: "tagnova-c731d.firebasestorage.app",
          messagingSenderId: "766445735869",
          appId: "1:766445735869:web:6be60478a80ba4882c8cd4"
        };
        firebase.initializeApp(firebaseConfig);

        let userRole = 'student';

        function selectRole(role) {
            userRole = role;
            document.getElementById('studentTab').classList.toggle('active', role === 'student');
            document.getElementById('teacherTab').classList.toggle('active', role === 'instructor');
        }

        function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            firebase.auth().signInWithPopup(provider).then(() => redirect()).catch(e => alert(e.message));
        }

        function authAction(type) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("اكمل البيانات");

            if(type === 'login') {
                firebase.auth().signInWithEmailAndPassword(email, password).then(() => redirect()).catch(e => alert("خطأ في الدخول"));
            } else {
                firebase.auth().createUserWithEmailAndPassword(email, password).then(() => redirect()).catch(e => alert(e.message));
            }
        }

        function redirect() {
            if(userRole === 'instructor') window.location.href = "/admin_dashboard";
            else window.location.href = "/dashboard";
        }
    </script>
</body>
</html>
