<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | TajNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0b0e14;
            --side-bg: #11141b;
            --card-bg: rgba(22, 27, 34, 0.6);
            --primary: #8b5cf6;
            --accent: #a78bfa;
            --text-main: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--side-bg);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .nav-link {
            display: flex; align-items: center; padding: 15px 20px;
            color: var(--text-dim); text-decoration: none; border-radius: 15px;
            margin-bottom: 8px; transition: 0.3s; font-weight: 600;
        }
        .nav-link.active, .nav-link:hover { background: rgba(139, 92, 246, 0.1); color: var(--primary); }

        /* Main Content */
        .main-wrapper { flex-grow: 1; padding: 40px; max-width: calc(100% - 280px); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 25px; border-radius: 24px; backdrop-filter: blur(10px);
        }

        .section-title { margin: 40px 0 25px; font-size: 1.4rem; font-weight: 800; }
        .courses-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 28px; overflow: hidden; transition: 0.4s;
        }
        .course-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        .thumb { width: 100%; height: 180px; background-size: cover; background-position: center; position: relative; }
        .course-info { padding: 20px; }
        .progress-container { margin-top: 15px; background: #1a1c2e; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .nav-link span, .logo-area h2 { display: none; }
            .main-wrapper { max-width: calc(100% - 80px); padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">
            <img src="logotagnova.png" width="45">
            <h2 style="font-size: 1.2rem; font-weight: 900;">TAJNOVA</h2>
        </div>
        <nav>
            <a href="#" class="nav-link active">🏠 <span>الرئيسية</span></a>
            <a href="#" class="nav-link">📚 <span>كورساتي</span></a>
            <a href="#" class="nav-link">⚙️ <span>الإعدادات</span></a>
        </nav>
        <div style="margin-top: auto;">
            <a href="/logout" class="nav-link" style="color: #ef4444;">🚪 <span>خروج</span></a>
        </div>
    </aside>

    <main class="main-wrapper">
        <header class="top-bar">
            <div>
               <h1 style="font-size: 1.8rem; font-weight: 900;">أهلاً بك في تاجنوفا 👋</h1>
               <p style="color: var(--text-dim);">اكتشف الكورسات الجديدة وابدأ رحلتك.</p>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><h3>الكورسات المتاحة</h3><p id="count-display">0</p></div>
            <div class="stat-card"><h3>نقاط التعلم</h3><p>1250</p></div>
        </section>
        
        <section>
            <h2 class="section-title">✨ كورسات مقترحة لك</h2>
            <div class="courses-grid" id="courses-list">
                <p style="color: var(--text-dim);">جاري تحميل المحتوى...</p>
            </div>
        </section>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB3HKkZM7R2smYZWMPWFv-qlB1EsDLLtZ8",
            authDomain: "tagnova-c731d.firebaseapp.com",
            databaseURL: "https://tagnova-c731d-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "tagnova-c731d",
        };
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.database();
        const coursesContainer = document.getElementById('courses-list');
        const countDisplay = document.getElementById('count-display');

        // سحب البيانات الحقيقية
        db.ref('courses/').on('value', (snapshot) => {
            const data = snapshot.val();
            coursesContainer.innerHTML = ''; 
            
            if (!data) {
                coursesContainer.innerHTML = '<p>لا توجد كورسات منشورة حالياً.</p>';
                countDisplay.innerText = "0";
                return;
            }

            let count = 0;
            for (let id in data) {
                count++;
                const course = data[id];
                const videoID = getYoutubeID(course.url || course.video_url);
                const thumb = `https://img.youtube.com/vi/${videoID}/maxresdefault.jpg`;
                
                coursesContainer.innerHTML += `
                    <div class="course-card">
                        <div class="thumb" style="background-image: url('${thumb}')">
                            <div style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem;">PRO</div>
                        </div>
                        <div class="course-info">
                            <h4 style="margin-bottom: 8px;">${course.title}</h4>
                            <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 15px;">بواسطة: TajNova Instructor</p>
                            <div class="progress-container"><div class="progress-bar"></div></div>
                            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                                <span style="font-size: 0.8rem; color: var(--text-dim);">0% مكتمل</span>
                                <button onclick="window.location.href='/player?v=${id}'" 
                                        style="background: var(--primary); color: white; border: none; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-family: 'Cairo'; font-size: 0.8rem;">
                                    دخول الكورس
                                </button>
                            </div>
                        </div>
                    </div>`;
            }
            countDisplay.innerText = count;
        });

        function getYoutubeID(url) {
            if (!url) return "dQw4w9WgXcQ";
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : "dQw4w9WgXcQ";
        }
    </script>
</body>
</html>
