<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مشاهدة الكورس | TajNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0e14; color: white; font-family: 'Cairo'; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .video-container { width: 90%; max-width: 1000px; margin-top: 50px; border-radius: 20px; overflow: hidden; border: 1px solid #8b5cf6; box-shadow: 0 0 30px rgba(139, 92, 246, 0.2); position: relative; aspect-ratio: 16/9; }
        
        /* شاشة القفل لو الطالب مدفعش */
        .lock-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .btn-buy { background: #8b5cf6; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="lockScreen" class="lock-screen">
            <h2 style="margin-bottom: 20px;">🔒 هذا المحتوى مدفوع</h2>
            <p style="margin-bottom: 30px; color: #9ca3af;">يجب الاشتراك في الكورس لتتمكن من المشاهدة</p>
            <button class="btn-buy" onclick="alert('سيتم توجيهك لبوابة الدفع')">اشترك الآن</button>
        </div>

        <iframe id="videoPlayer" src="" style="border: none; position: absolute; top: 0; height: 100%; width: 100%;" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen="true"></iframe>
    </div>

    <div style="width: 90%; max-width: 1000px; margin-top: 30px;">
        <h1 id="courseTitle">تحميل...</h1>
        <p id="courseDesc" style="color: #9ca3af;">وصف الكورس يظهر هنا...</p>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    // Config بتاعك
    const firebaseConfig = { /* حط الكونفيج بتاعك هنا */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. الحصول على ID الكورس من الرابط (URL)
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('v');

    firebase.auth().onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "auth.html"; // لو مش مسجل دخول يطرده
            return;
        }

        // 2. فحص الكورس في الداتا بيز
        db.ref('courses/' + courseId).once('value', snapshot => {
            const course = snapshot.val();
            document.getElementById('courseTitle').innerText = course.title;

            // 3. فحص هل الطالب دفع (Permissions)
            db.ref('users/' + user.uid + '/my_courses/' + courseId).once('value', paySnapshot => {
                if (paySnapshot.exists() || course.is_free) {
                    // الطالب معاه حق المشاهدة -> افتح الفيديو المشفر
                    document.getElementById('videoPlayer').src = `https://iframe.mediadelivery.net/embed/${course.libraryId}/${course.videoId}?autoplay=true`;
                } else {
                    // الطالب مدفعش -> اظهر قفل
                    document.getElementById('lockScreen').style.display = 'flex';
                }
            });
        });
    });
</script>
</body>
</html>
