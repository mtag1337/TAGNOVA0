<main class="main-wrapper">
    <header class="top-bar">
        <div>
            <h1 style="font-size: 1.8rem; font-weight: 900;">استوديو الإدارة 🎙️</h1>
            <p style="color: var(--text-dim);">مرحباً م. أحمد، إليك ملخص أداء كورساتك اليوم</p>
        </div>
        <button style="background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 700; cursor: pointer;">
            + رفع كورس جديد
        </button>
    </header>

    <section class="stats-grid">
        <div class="stat-card" style="border-right: 4px solid #10b981;">
            <h3>إجمالي الأرباح</h3>
            <p>$1,250.00</p>
        </div>
        <div class="stat-card">
            <h3>الطلاب المشتركين</h3>
            <p>450</p>
        </div>
        <div class="stat-card">
            <h3>متوسط التقييم</h3>
            <p>4.8 ⭐</p>
        </div>
    </section>

    <section>
        <h2 class="section-title">إدارة المحتوى</h2>
        <div style="background: var(--card-bg); border-radius: 28px; padding: 20px; border: 1px solid var(--border);">
            <table style="width: 100%; border-collapse: collapse; text-align: right;">
                <thead>
                    <tr style="color: var(--text-dim); border-bottom: 1px solid var(--border);">
                        <th style="padding: 15px;">اسم الكورس</th>
                        <th>المبيعات</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid var(--border);">
                        <td style="padding: 15px;">دبلومة الذكاء الاصطناعي</td>
                        <td>120 طالب</td>
                        <td><span style="color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 0.8rem;">منشور</span></td>
                        <td><button style="background: none; border: 1px solid var(--primary); color: var(--primary); padding: 5px 15px; border-radius: 8px; cursor: pointer;">تعديل</button></td>
                    </tr>
                    </tbody>
            </table>
        </div>
    </section>
</main>
